<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3020 SvS Prep Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Base Styling */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%); 
            color: white; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }

        /* Animated Header Box */
        .header-box { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(10px);
            border: 1px solid #38bdf8; 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            margin-bottom: 40px; 
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        h1 { 
            color: #38bdf8; 
            margin: 0 0 10px 0; 
            font-size: 2.2rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* Pulsing Countdown */
        #countdown { 
            font-size: 1.6rem; 
            color: #facc15; 
            font-weight: 800; 
            margin: 15px 0; 
            padding: 15px 0;
            border-top: 1px solid rgba(56, 189, 248, 0.3);
            border-bottom: 1px solid rgba(56, 189, 248, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .rules { font-size: 0.95rem; color: #cbd5e1; line-height: 1.8; text-align: left; max-width: 650px; margin: 0 auto; }
        .highlight { color: #38bdf8; font-weight: bold; }
        .important { color: #f87171; font-weight: bold; }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            padding: 20px; 
            border-radius: 16px; 
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover { 
            transform: translateY(-5px); 
            border-color: #38bdf8; 
        }

        .time { 
            font-size: 1.25rem; 
            font-weight: 800; 
            margin-bottom: 15px; 
            border-left: 4px solid #38bdf8; 
            padding-left: 10px; 
            color: #facc15; 
        }

        /* Slot Styling */
        .slot { 
            margin: 10px 0; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid #334155; 
            background: rgba(15, 23, 42, 0.5); 
            transition: all 0.3s; 
        }

        .booked { 
            background: rgba(69, 10, 10, 0.4); 
            border-color: #ef4444; 
            box-shadow: inset 0 0 10px rgba(239, 68, 68, 0.2);
        }

        /* Inputs & Buttons */
        input { 
            padding: 8px; 
            border-radius: 6px; 
            border: 1px solid #475569; 
            background: #0f172a; 
            color: white; 
            width: 32%; 
            margin-right: 4px; 
            font-size: 0.8rem;
        }
        input:focus { border-color: #38bdf8; outline: none; }

        button { 
            padding: 8px 15px; 
            background: #38bdf8; 
            border: none; 
            border-radius: 6px; 
            color: #0f172a; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 0.8rem; 
            float: right;
            text-transform: uppercase;
        }
        button:hover { background: #7dd3fc; box-shadow: 0 0 10px #38bdf8; }

        .booked-status { 
            font-weight: 800; 
            color: #f87171; 
            font-size: 1rem; 
            margin-top: 5px; 
            letter-spacing: 2px;
            display: flex;
            align-items: center;
        }
        .booked-status::before { content: '●'; margin-right: 8px; animation: blink 1s infinite; }

        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }

        .task-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 8px; }
        .clear { clear: both; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>🏆 3020 SvS Prep Scheduler</h1>
        <div id="countdown">Loading Countdown...</div>
        <div class="rules">
            • <span class="highlight">UTC FORMAT</span> • Please ensure your game clock matches.<br>
            • <span class="highlight">LIMIT:</span> One slot per category (Training, Research, Construction).<br>
            • <span class="important">HELP:</span> Difficulty booking or need to change? Contact <span style="color:white; text-decoration:underline;">Ivy (DMN)</span>.
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        const WOS_URL = "https://qpfcyepmtaytyzimjont.supabase.co";
        const WOS_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmN5ZXBtdGF5dHl6aW1qb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjYyMTMsImV4cCI6MjA5MTY0MjIxM30.OnQ_JvbV-DvY-6PvLc9649Oo6bAuS8YE_WUk6bkVi_E";
        const wosClient = window.supabase.createClient(WOS_URL, WOS_KEY);

        const ALLOWED_ALLIANCES = ['DMN', 'PHX', 'ONE', 'TWO', 'PX2', 'ICE', 'EFX', 'HTR', 'CAT', 'SVS'];
        const tasks = [
            { label: '⚔️ Training', color: '#3b82f6' },
            { label: '🧬 Research', color: '#a855f7' },
            { label: '🏗️ Construction', color: '#f97316' }
        ];

        function updateCountdown() {
            const target = new Date("2026-04-20T00:00:00Z").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) { document.getElementById("countdown").innerHTML = "🚀 SVS PREP IS LIVE!"; return; }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `STARTS IN: ${days}D ${hours}H ${mins}M ${secs}S`;
        }
        setInterval(updateCountdown, 1000);

        async function loadData() {
            const { data, error } = await wosClient.from('svs_bookings').select('*');
            if (!error) render(data || []);
        }
        setInterval(loadData, 30000);

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let h = 0; h < 24; h++) {
                const hourStr = h.toString().padStart(2, '0');
                const nextHourStr = (h === 23 ? 0 : h + 1).toString().padStart(2, '0');
                const windows = [{ start: "00", end: "30", id: "00" }, { start: "30", end: "00", id: "30", next: true }];

                windows.forEach(w => {
                    const endH = w.next ? nextHourStr : hourStr;
                    const displayTime = `${hourStr}:${w.start} - ${endH}:${w.end} UTC`;
                    const dbTimeId = `${hourStr}:${w.id}`; 
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div class="time">${displayTime}</div>`;

                    tasks.forEach(task => {
                        const slotId = `${dbTimeId}-${task.label}`;
                        const booking = list.find(x => x.time_id === dbTimeId && x.task_type === task.label);
                        const slot = document.createElement('div');
                        slot.className = `slot ${booking ? 'booked' : ''}`;

                        if (booking) {
                            slot.innerHTML = `<div class="task-label" style="color:${task.color}">${task.label}</div><div class="booked-status">BOOKED</div>`;
                        } else {
                            slot.innerHTML = `
                                <div class="task-label" style="color:${task.color}">${task.label}</div>
                                <input type="text" id="n-${slotId}" placeholder="IGN">
                                <input type="text" id="a-${slotId}" placeholder="Alliance">
                                <button onclick="book('${dbTimeId}', '${task.label}')">GO</button>
                                <div class="clear"></div>`;
                        }
                        card.appendChild(slot);
                    });
                    grid.appendChild(card);
                });
            }
        }

        async function book(time, taskLabel) {
            const slotId = `${time}-${taskLabel}`;
            const n = document.getElementById(`n-${slotId}`).value.trim();
            const a = document.getElementById(`a-${slotId}`).value.trim();
            if(!n || !a) return alert("Please fill in IGN and Alliance!");
            if (!ALLOWED_ALLIANCES.includes(a.toUpperCase())) return alert("Access Restricted. Contact Ivy (DMN)!");
            const { data: existing } = await wosClient.from('svs_bookings').select('chief_name').eq('task_type', taskLabel);
            if (existing.some(b => b.chief_name.toLowerCase() === n.toLowerCase())) return alert(`Wait! ${n} already has a ${taskLabel} slot.`);
            const { error } = await wosClient.from('svs_bookings').insert([{ time_id: time, chief_name: n, alliance_tag: a.toUpperCase(), task_type: taskLabel }]);
            if (error) alert("Booking failed!"); else loadData();
        }

        loadData();
        updateCountdown();
    </script>
</body>
</html>
