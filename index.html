<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3020 SvS Prep Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .header-box { background: #1e293b; border: 2px solid #38bdf8; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 30px; }
        h1 { color: #38bdf8; margin: 0 0 10px 0; font-size: 2rem; }
        #countdown { font-size: 1.5rem; color: #facc15; font-weight: bold; margin: 10px 0; border-top: 1px solid #334155; border-bottom: 1px solid #334155; padding: 10px 0; }
        .rules { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; text-align: left; max-width: 650px; margin: 0 auto; }
        .highlight { color: #38bdf8; font-weight: bold; }
        .important { color: #f87171; font-weight: bold; text-decoration: underline; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; }
        .time { font-size: 1.2rem; font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid #38bdf8; padding-bottom: 5px; color: #facc15; }
        .slot { margin: 8px 0; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #262f3f; transition: 0.3s; }
        .booked { background: #450a0a; border-color: #ef4444; }
        input { padding: 6px; border-radius: 4px; border: 1px solid #475569; background: #0f172a; color: white; width: 32%; margin-right: 4px; font-size: 0.85rem; }
        button { padding: 6px 12px; background: #38bdf8; border: none; border-radius: 4px; color: #0f172a; font-weight: bold; cursor: pointer; font-size: 0.85rem; float: right; }
        button:hover { background: #7dd3fc; }
        .booked-name { font-weight: bold; color: white; font-size: 1rem; margin-top: 4px; }
        .task-label { font-size: 0.75rem; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; margin-bottom: 6px; }
        .clear { clear: both; }
    </style>
</head>
<body>

    <div class="header-box">
        <h1>🏆 3020 SvS Prep Scheduler</h1>
        <div id="countdown">Loading Countdown...</div>
        <div class="rules">
            • <span class="highlight">All Times are in UTC</span><br>
            • <span class="highlight">IGN</span> = Your In-Game Username<br>
            • <span class="important">BOOKING RULES:</span> You can book <span style="color:white;">ONE</span> of each task (1 Training, 1 Research, 1 Construction).<br>
            • <span class="highlight">Help:</span> If anyone has difficulty booking a slot, please reach out to <span style="color:white;">Ivy (DMN)</span>.
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <script>
        const WOS_URL = "https://qpfcyepmtaytyzimjont.supabase.co";
        const WOS_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmN5ZXBtdGF5dHl6aW1qb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjYyMTMsImV4cCI6MjA5MTY0MjIxM30.OnQ_JvbV-DvY-6PvLc9649Oo6bAuS8YE_WUk6bkVi_E";
        const wosClient = window.supabase.createClient(WOS_URL, WOS_KEY);

        const ALLOWED_ALLIANCES = ['DMN', 'PHX', 'ONE', 'TWO', 'PX2', 'ICE', 'EFX', 'HTR', 'CAT', 'SVS'];
        const tasks = [
            { label: '⚔️ Training', color: '#3b82f6' },
            { label: '🧬 Research', color: '#a855f7' },
            { label: '🏗️ Construction', color: '#f97316' }
        ];

        function updateCountdown() {
            const target = new Date("2026-04-20T00:00:00Z").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            if (diff <= 0) { document.getElementById("countdown").innerHTML = "🚀 SVS PREP IS LIVE!"; return; }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = `Starts in: ${days}d ${hours}h ${mins}m ${secs}s`;
        }
        setInterval(updateCountdown, 1000);

        async function loadData() {
            const { data, error } = await wosClient.from('svs_bookings').select('*');
            if (!error) render(data || []);
        }
        setInterval(loadData, 30000);

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let h = 0; h < 24; h++) {
                const hourStr = h.toString().padStart(2, '0');
                const nextHourStr = (h === 23 ? 0 : h + 1).toString().padStart(2, '0');

                // Two Slots: :00 to :30 and :30 to :00
                const windows = [
                    { start: "00", end: "30", dbId: "00" },
                    { start: "30", end: "00", dbId: "30", isNextHour: true }
                ];

                windows.forEach(w => {
                    const endH = w.isNextHour ? nextHourStr : hourStr;
                    const displayTime = `${hourStr}:${w.start} - ${endH}:${w.end} UTC`;
                    const dbTimeId = `${hourStr}:${w.dbId}`; 

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div class="time">${displayTime}</div>`;

                    tasks.forEach(task => {
                        const slotId = `${dbTimeId}-${task.label}`;
                        const booking = list.find(x => x.time_id === dbTimeId && x.task_type === task.label);
                        const slot = document.createElement('div');
                        slot.className = `slot ${booking ? 'booked' : ''}`;

                        if (booking) {
                            slot.innerHTML = `
                                <div class="task-label" style="color:${task.color}">${task.label}</div>
                                <div class="booked-name">${booking.chief_name} [${booking.alliance_tag}]</div>
                            `;
                        } else {
                            slot.innerHTML = `
                                <div class="task-label" style="color:${task.color}">${task.label}</div>
                                <input type="text" id="n-${slotId}" placeholder="IGN">
                                <input type="text" id="a-${slotId}" placeholder="Alliance">
                                <button onclick="book('${dbTimeId}', '${task.label}')">GO</button>
                                <div class="clear"></div>
                            `;
                        }
                        card.appendChild(slot);
                    });
                    grid.appendChild(card);
                });
            }
        }

        async function book(time, taskLabel) {
            const slotId = `${time}-${taskLabel}`;
            const n = document.getElementById(`n-${slotId}`).value.trim();
            const a = document.getElementById(`a-${slotId}`).value.trim();
            if(!n || !a) return alert("Fill in IGN and Alliance!");
            if (!ALLOWED_ALLIANCES.includes(a.toUpperCase())) {
                return alert("Access Restricted. Reach out to Ivy (DMN) for help!");
            }
            const { data: existing } = await wosClient.from('svs_bookings').select('chief_name').eq('task_type', taskLabel);
            if (existing.some(b => b.chief_name.toLowerCase() === n.toLowerCase())) {
                return alert(`Wait! ${n} already has a ${taskLabel} slot.`);
            }
            const { error } = await wosClient.from('svs_bookings').insert([{ 
                time_id: time, chief_name: n, alliance_tag: a.toUpperCase(), task_type: taskLabel 
            }]);
            if (error) alert("Booking failed!");
            else loadData();
        }

        loadData();
        updateCountdown();
    </script>
</body>
</html>
