<!DOCTYPE html>
<html>
<head>
    <title>WOS SvS Scheduler</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e293b; border: 1px solid #384455; padding: 15px; border-radius: 10px; }
        .time { font-size: 1.2rem; font-weight: bold; color: #fde047; }
        select, input, button { width: 100%; margin-top: 10px; padding: 8px; border-radius: 5px; border: none; }
        button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
        .booked { border: 2px solid #ef4444; background: #450a0a; }
    </style>
</head>
<body>
    <h1>SvS Training, Research & Building</h1>
    <p>Select your task and enter your name to book a 30m slot.</p>
    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        for (let h = 0; h < 24; h++) {
            for (let m of ['00', '30']) {
                const time = `${h.toString().padStart(2, '0')}:${m}`;
                const div = document.createElement('div');
                div.className = 'card';
                div.id = `slot-${time}`;
                div.innerHTML = `
                    <div class="time">${time}</div>
                    <select id="type-${time}">
                        <option>⚔️ Training</option>
                        <option>🧬 Research</option>
                        <option>🏗️ Building</option>
                    </select>
                    <input type="text" id="name-${time}" placeholder="Governor Name">
                    <button onclick="book('${time}')">Confirm</button>
                `;
                grid.appendChild(div);
            }
        }

        function book(t) {
            const name = document.getElementById(`name-${t}`).value;
            const type = document.getElementById(`type-${t}`).value;
            if(!name) return alert("Enter name!");
            const card = document.getElementById(`slot-${t}`);
            card.className = 'card booked';
            card.innerHTML = `<div class="time">${t}</div><div style="color:#fde047">${type}</div><div>${name}</div>`;
        }
    </script>
</body>
</html>
