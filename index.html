<!DOCTYPE html>
<html>
<head>
    <title>WOS SvS Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 10px; }
        .time { font-size: 1.2rem; font-weight: bold; color: #fde047; }
        .booked { border: 2px solid #ef4444; background: #450a0a; }
        input, select, button { width: 90%; margin-top: 8px; padding: 8px; border-radius: 5px; }
        button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <h1>SvS Master Scheduler</h1>
    <div id="status">Syncing...</div>
    <div class="grid" id="grid"></div>

    <script>
        // We changed the name to "wosClient" to stop the "already declared" error
        const WOS_URL = "https://qpfcyepmtaytyzimjont.supabase.co";
        const WOS_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmN5ZXBtdGF5dHl6aW1qb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjYyMTMsImV4cCI6MjA5MTY0MjIxM30.OnQ_JvbV-DvY-6PvLc9649Oo6bAuS8YE_WUk6bkVi_E";
        const wosClient = window.supabase.createClient(WOS_URL, WOS_KEY);

        async function loadData() {
            const { data, error } = await wosClient.from('svs_bookings').select('*');
            if (error) {
                document.getElementById('status').innerText = "Check Table Name in Supabase!";
                return;
            }
            render(data);
            document.getElementById('status').innerText = "Live";
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let h = 0; h < 24; h++) {
                for (let m of ['00', '30']) {
                    const t = `${h.toString().padStart(2, '0')}:${m}`;
                    const b = list.find(x => x.time_id === t);
                    const div = document.createElement('div');
                    div.className = `card ${b ? 'booked' : ''}`;
                    if (b) {
                        div.innerHTML = `<div class="time">${t}</div><div>${b.task_type}</div><div>${b.chief_name}</div><div style="font-size:12px">[${b.alliance_tag}]</div>`;
                    } else {
                        div.innerHTML = `
                            <div class="time">${t}</div>
                            <select id="type-${t}"><option>⚔️ Training</option><option>🧬 Research</option><option>🏗️ Building</option></select>
                            <input type="text" id="n-${t}" placeholder="Chief Name">
                            <input type="text" id="a-${t}" placeholder="Alliance">
                            <button onclick="book('${t}')">Confirm</button>`;
                    }
                    grid.appendChild(div);
                }
            }
        }

        async function book(t) {
            const n = document.getElementById(`n-${t}`).value;
            const a = document.getElementById(`a-${t}`).value;
            const type = document.getElementById(`type-${t}`).value;
            if(!n || !a) return alert("Fill all boxes!");

            await wosClient.from('svs_bookings').insert([{ time_id: t, chief_name: n, alliance_tag: a, task_type: type }]);
            loadData();
        }

        loadData();
    </script>
</body>
</html>
