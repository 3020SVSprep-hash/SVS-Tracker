<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3020 SvS Scheduler</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        h1 { text-align: center; color: #38bdf8; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; }
        .time { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #38bdf8; }
        .slot { margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #334155; }
        .booked { background: #450a0a; border-color: #ef4444; }
        input { padding: 5px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; color: white; width: 35%; margin-right: 2px; font-size: 0.8rem; }
        button { padding: 5px 10px; background: #38bdf8; border: none; border-radius: 4px; color: #0f172a; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .booked-name { font-weight: bold; color: white; }
        .task-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <h1>🏆 3020 SvS Prep Scheduler</h1>
    <div class="grid" id="grid"></div>

    <script>
        // REPLACE THESE WITH YOUR ACTUAL DETAILS
        const WOS_URL = "https://qpfcyepmtaytyzimjont.supabase.co";
        const WOS_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwZmN5ZXBtdGF5dHl6aW1qb250Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNjYyMTMsImV4cCI6MjA5MTY0MjIxM30.OnQ_JvbV-DvY-6PvLc9649Oo6bAuS8YE_WUk6bkVi_E";
        const wosClient = window.supabase.createClient(WOS_URL, WOS_KEY);

        async function loadData() {
            const { data, error } = await wosClient.from('svs_bookings').select('*');
            if (error) console.error(error);
            render(data || []);
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const tasks = [
                { label: '⚔️ Training', color: '#3b82f6' },
                { label: '🧬 Research', color: '#a855f7' },
                { label: '🏗️ Construction', color: '#f97316' }
            ];

            for (let h = 0; h < 24; h++) {
                for (let m of ['00', '30']) {
                    const time = `${h.toString().padStart(2, '0')}:${m}`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `<div class="time">${time}</div>`;

                    tasks.forEach(task => {
                        const slotId = `${time}-${task.label}`;
                        const booking = list.find(x => x.time_id === time && x.task_type === task.label);
                        
                        const slot = document.createElement('div');
                        slot.className = `slot ${booking ? 'booked' : ''}`;

                        if (booking) {
                            slot.innerHTML = `
                                <div class="task-label" style="color:${task.color}">${task.label}</div>
                                <div class="booked-name">${booking.chief_name} [${booking.alliance_tag}]</div>
                            `;
                        } else {
                            slot.innerHTML = `
                                <div class="task-label" style="color:${task.color}">${task.label}</div>
                                <input type="text" id="n-${slotId}" placeholder="Name">
                                <input type="text" id="a-${slotId}" placeholder="Tag">
                                <button onclick="book('${time}', '${task.label}')">GO</button>
                            `;
                        }
                        card.appendChild(slot);
                    });
                    grid.appendChild(card);
                }
            }
        }

        async function book(time, taskLabel) {
            const slotId = `${time}-${taskLabel}`;
            const n = document.getElementById(`n-${slotId}`).value.trim();
            const a = document.getElementById(`a-${slotId}`).value.trim();

            if(!n || !a) return alert("Fill in both Name and Alliance Tag!");

            const { error } = await wosClient.from('svs_bookings').insert([
                { 
                    time_id: time, 
                    chief_name: n, 
                    alliance_tag: a, 
                    task_type: taskLabel 
                }
            ]);

            if (error) {
                alert("Error booking slot. It might be taken!");
                console.error(error);
            }
            loadData();
        }

        loadData();
    </script>
</body>
</html>
